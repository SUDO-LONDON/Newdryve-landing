  <path
    d="M29.596 64 L20.356 64 L20.356 30.736 L28.474 30.736 L29.134 36.148 Q30.652 33.376 33.457 31.66 Q36.262 29.944 40.222 29.944 Q44.314 29.944 47.152 31.693 Q49.99 33.442 51.475 36.742 Q52.96 40.042 52.96 44.86 L52.96 64 L43.786 64 L43.786 45.718 Q43.786 41.89 42.169 39.811 Q40.552 37.732 37.054 37.732 Q34.942 37.732 33.226 38.755 Q31.51 39.778 30.553 41.659 Q29.596 43.54 29.596 46.246 L29.596 64 Z"
