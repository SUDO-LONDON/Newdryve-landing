    <line x1="25" y1="33" x2="25" y2="62"
          stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 3"/>
    <!-- Arch: from left-stem centre (25,43) through peak ~(37,34) to right-stem centre (48,45) -->
    <path d="M 25 43 C 30 35 48 27 48 45"
